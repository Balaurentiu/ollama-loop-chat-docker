name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow pystray

      # ── Icon conversion ───────────────────────────────────────────────────
      - name: Convert icon PNG → ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('Icon converted')
          "

      # ── Build Flask server ────────────────────────────────────────────────
      - name: Build server with PyInstaller
        run: pyinstaller server.spec --distpath server_dist

      # ── Build tray app ────────────────────────────────────────────────────
      - name: Build tray app with PyInstaller
        run: pyinstaller tray_app.spec --distpath tray_dist

      # ── Inno Setup installer ──────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss
        shell: pwsh

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OllamaChat-Windows-Installer
          path: installer_out/*.exe
          if-no-files-found: error

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_out/*.exe
          generate_release_notes: true
