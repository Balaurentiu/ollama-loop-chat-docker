name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup + PyInstaller ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert icon PNG → ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('Icon converted')
          "

      - name: Build server with PyInstaller
        run: pyinstaller server.spec --distpath server_dist_raw

      - name: Rename dist folder
        run: |
          mkdir -p server_dist
          xcopy /E /I server_dist_raw\server server_dist\

      # ── Node.js + Electron Builder ────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Electron installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OllamaChat-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error

      # ── Create GitHub Release (only on tag push) ──────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
